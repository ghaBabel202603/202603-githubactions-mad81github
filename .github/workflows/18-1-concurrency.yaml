name: 18 - 1 - Managing Concurrency

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  slow-greet:
    runs-on: ubuntu-latest

    steps:
      - name: Slow greeting
        run: |
          echo "Hola desde un workflow lento..."
          sleep 30
          echo "Terminado!"