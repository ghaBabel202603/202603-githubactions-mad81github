name: 17 - 6 - Custom Actions - Docker
on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Your name'
        required: true
        default: 'World'
jobs:
  hello-to-you-docker:
    runs-on: ubuntu-latest
    outputs:
      time: ${{ steps.hello-to-you.outputs.time }}
    steps:
      - uses: actions/checkout@v3
      - name: Hello to You     
        id: hello-to-you   
        uses: ./.github/actions/hello-to-you-docker
        with:
          name: ${{ inputs.name }}

  Get-the-time:
    runs-on: ubuntu-latest
    needs: hello-to-you-docker
    steps:
      - name: Get the time from the Docker action
        run: | 
         echo "The time is: ${{ needs.hello-to-you-docker.outputs.time }}"